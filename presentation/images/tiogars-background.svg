<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#232946"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#3a3a5a" stroke-width="1"/>
    </pattern>
    <radialGradient id="radial" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#232946" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <circle cx="1600" cy="200" r="300" fill="url(#radial)"/>
  <circle cx="400" cy="900" r="200" fill="url(#radial)"/>
  <g stroke="#00d4ff" stroke-width="2" opacity="0.2">
    <polyline points="0,1000 400,800 800,900 1200,700 1600,900 1920,800" fill="none"/>
    <polyline points="0,200 300,400 700,300 1100,500 1500,300 1920,400" fill="none"/>
  </g>
  <g opacity="0.08">
    <rect x="200" y="200" width="400" height="200" rx="20" fill="#00d4ff"/>
    <rect x="1320" y="700" width="300" height="150" rx="30" fill="#00d4ff"/>
  </g>
  <text x="50%" y="1040" text-anchor="middle" fill="#fff" font-size="32" font-family="monospace" opacity="0.2">tiogars - ©2026</text>
</svg>
