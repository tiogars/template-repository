site_name: Template Repository
site_description: A template repository with a MkDocs documentation and GitHub Actions workflows for CI, CD and docs generation.
site_url: https://template-repository.tiogars.fr/docs/
repo_url: https://github.com/tiogars/template-repository
repo_name: tiogars/template-repository

edit_uri: edit/main/docs/

site_author: Tiogars
copyright: © 2026, Tiogars
site_dir: site_output

docs_dir: docs

nav:
