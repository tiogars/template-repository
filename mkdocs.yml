  - Overview:
      - Overview: 0-overview/index.md
      - README Guide: 0-overview/0.1-readme-guide/index.md
  - Specification:
      - Overview: 1-specification/index.md
      - Basic Webapp:
          - Overview: 1-specification/1.1-basic-webapp/index.md
          - Functional Specification:
              - Overview: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/index.md
              - Repository Template Management: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.1-repository-template-management/index.md
              - Tag Management: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.2-tag-management/index.md
              - Dashboard: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.3-dashboard/index.md
              - Header: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.4-header/index.md
              - Floating Action Buttons: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.5-floating-action-buttons/index.md
              - Import and Export: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.6-import-export/index.md
              - Footer: 1-specification/1.1-basic-webapp/1.1.1-functional-specification/1.1.1.7-footer/index.md
          - Data and Persistence: 1-specification/1.1-basic-webapp/1.1.2-data-and-persistence/index.md
          - User Experience:
              - Overview: 1-specification/1.1-basic-webapp/1.1.3-user-experience/index.md
              - Theme Palette: 1-specification/1.1-basic-webapp/1.1.3-user-experience/1.1.3.1-theme-palette/index.md
          - Technical Stack: 1-specification/1.1-basic-webapp/1.1.4-technical-stack/index.md
          - Technical Methodology: 1-specification/1.1-basic-webapp/1.1.5-technical-methodology/index.md
          - Coding Conventions: 1-specification/1.1-basic-webapp/1.1.6-coding-conventions/index.md
          - Acceptance Criteria: 1-specification/1.1-basic-webapp/1.1.7-acceptance-criteria/index.md
  - Delivery:
      - Overview: 2-delivery/index.md
      - Basic Webapp Implementation Plan:
          - Overview: 2-delivery/2.1-basic-webapp-implementation-plan/index.md
          - Target Architecture: 2-delivery/2.1-basic-webapp-implementation-plan/2.1.1-target-architecture/index.md
          - Implementation Phases: 2-delivery/2.1-basic-webapp-implementation-plan/2.1.2-implementation-phases/index.md
          - Work Breakdown: 2-delivery/2.1-basic-webapp-implementation-plan/2.1.3-work-breakdown/index.md
          - Testing Plan: 2-delivery/2.1-basic-webapp-implementation-plan/2.1.4-testing-plan/index.md
          - Delivery Milestones: 2-delivery/2.1-basic-webapp-implementation-plan/2.1.5-delivery-milestones/index.md
      - Docker Deployment: 2-delivery/2.2-docker-deployment/index.md
  - Review:
      - Overview: 3-review/index.md
      - Implementation Status: 3-review/3.1-implementation-status/index.md
      - Open Points: 3-review/3.2-open-points/index.md
  - User Manual:
      - Overview: 4-user-manual/index.md
      - Dashboard: 4-user-manual/4.1-dashboard/index.md
      - Repository Templates: 4-user-manual/4.2-repository-templates/index.md
      - Tag Management: 4-user-manual/4.3-tag-management/index.md
      - Import and Export: 4-user-manual/4.4-import-export/index.md
      - Header: 4-user-manual/4.5-header/index.md
      - Floating Action Buttons: 4-user-manual/4.6-floating-action-buttons/index.md

theme:
  custom_dir: docs/overrides
  favicon: assets/images/favicon.png
  icon:
    repo: fontawesome/brands/github
  name: material
  highlightjs: true
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  # https://ultrabug.github.io/mkdocs-static-i18n/
  - i18n:
      # https://ultrabug.github.io/mkdocs-static-i18n/setup/choosing-the-structure/
      docs_structure: suffix
      # https://ultrabug.github.io/mkdocs-static-i18n/setup/controlling-your-builds/
      fallback_to_default: true
      # https://ultrabug.github.io/mkdocs-static-i18n/setup/setting-up-languages/
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Home: Accueil
            Features: Fonctionnalités
            Requirements: Prérequis
            Diagrams: Diagrammes
      # https://ultrabug.github.io/mkdocs-static-i18n/setup/setting-up-material/
      reconfigure_material: true

  # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/?h=search#configuration
  - search:

  # https://pypi.org/project/mkdocs-slides/
  - slides:

  # https://pypi.org/project/mkdocs-include-markdown-plugin/
  - include-markdown:

  # https://pypi.org/project/mkdocs-kroki-plugin/
  - kroki:
      server_url: 'https://kroki.tiogars.fr'
      fence_prefix: 'kroki-'
      enable_block_diag: true
      enable_bpmn: false
      enable_excalidraw: true
      enable_mermaid: true
      fail_fast: false
      http_method: POST
      file_types:
        - png
        - svg
      file_type_overrides:
        nwdiag: svg
        mermaid: png
  - macros:

  # https://pypi.org/project/mkdocs-with-pdf/
  - to-pdf:
      author: Tiogars
      back_cover: true
      copyright: Copyright © Tiogars 2026
      cover: true
      cover_logo: assets/images/favicon.png
      cover_subtitle: Documentation
      cover_title: Template Repository
      debug_html: true
      output_path: fr.tiogars.template-repository.pdf
  - print-site:
      add_to_navigation: false
      print_page_title: 'Print Site'
      print_page_basename: 'print_page'
      add_print_site_banner: false
      # Table of contents
      add_table_of_contents: true
      toc_title: 'Table of Contents'
      toc_depth: 6
      # Content-related
      add_full_urls: true
      enumerate_headings: true
      enumerate_figures: true
      add_cover_page: true
      cover_page_template: ""
      path_to_pdf: "fr.tiogars.template-repository.pdf"
      include_css: true
      enabled: true
      exclude: []

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      #   # make exceptions to highlighting of code:
      # custom_fences:
      #   - name: mermaid
      #     class: mermaid
      #     format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
